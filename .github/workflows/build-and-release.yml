name: Build And Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: windows
            os: windows-latest
            bundle: nsis
            artifact_name: tauri-windows-exe
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - name: macos
            os: macos-latest
            bundle: app
            artifact_name: tauri-macos-app
            artifact_path: src-tauri/target/release/bundle/macos/*.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri bundle
        run: pnpm tauri build --bundles ${{ matrix.platform.bundle }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: ${{ matrix.platform.artifact_path }}
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: tauri-windows-exe
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: tauri-macos-app
          path: artifacts/macos

      - name: Prepare release files
        shell: bash
        run: |
          set -eux
          WIN_EXE="$(find artifacts/windows -name '*.exe' | head -n 1)"
          cp "$WIN_EXE" tauri-windows-installer.exe

          cd artifacts/macos
          MAC_APP="$(find . -maxdepth 1 -name '*.app' | head -n 1)"
          zip -r ../../tauri-macos-app.zip "$MAC_APP"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tauri-windows-installer.exe
            tauri-macos-app.zip
